<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350" role="img" aria-label="Handheld gaming device">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="58%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#052b14"/>
    </linearGradient>
    <radialGradient id="glowA3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0bd25a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0bd25a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ink3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="soft3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
  </defs>

  <rect width="600" height="350" fill="url(#bg3)"/>

  <!-- soft accent glows -->
  <circle cx="489" cy="98" r="150" fill="url(#glowA3)" filter="url(#soft3)"/>
  <circle cx="159" cy="307" r="120" fill="url(#glowA3)" opacity="0.5" filter="url(#soft3)"/>

  <!-- decorative pattern -->
  <circle cx="331" cy="204" r="30" fill="none" stroke="#0bd25a" stroke-width="2" opacity="0.13"/>
  <circle cx="419" cy="236" r="17" fill="none" stroke="#0bd25a" stroke-width="2" opacity="0.13"/>
  <circle cx="479" cy="152" r="27" fill="none" stroke="#0bd25a" stroke-width="2" opacity="0.13"/>
  <circle cx="545" cy="124" r="15" fill="none" stroke="#0bd25a" stroke-width="2" opacity="0.13"/>
  <circle cx="443" cy="214" r="24" fill="none" stroke="#0bd25a" stroke-width="2" opacity="0.13"/>
  <circle cx="389" cy="170" r="15" fill="none" stroke="#0bd25a" stroke-width="2" opacity="0.13"/>
  <circle cx="527" cy="156" r="29" fill="none" stroke="#0bd25a" stroke-width="2" opacity="0.13"/>
  <circle cx="368" cy="261" r="29" fill="none" stroke="#0bd25a" stroke-width="2" opacity="0.13"/>
  <circle cx="434" cy="293" r="35" fill="none" stroke="#0bd25a" stroke-width="2" opacity="0.13"/>
  <circle cx="352" cy="133" r="26" fill="none" stroke="#0bd25a" stroke-width="2" opacity="0.13"/>
  <circle cx="473" cy="258" r="7" fill="none" stroke="#0bd25a" stroke-width="2" opacity="0.13"/>
  <circle cx="527" cy="185" r="13" fill="none" stroke="#0bd25a" stroke-width="2" opacity="0.13"/>
  <circle cx="394" cy="323" r="36" fill="none" stroke="#0bd25a" stroke-width="2" opacity="0.13"/>
  <circle cx="425" cy="129" r="33" fill="none" stroke="#0bd25a" stroke-width="2" opacity="0.13"/>

  <!-- large watermark icon -->
  <g transform="translate(372,150) scale(2.1)" opacity="0.08"><path d="M28 34 H72 C84 34 92 46 92 60 C92 72 86 78 79 78
              C73 78 70 72 66 68 H34 C30 72 27 78 21 78 C14 78 8 72 8 60
              C8 46 16 34 28 34 Z" fill="none" stroke="#0bd25a" stroke-width="4"/>
            <line x1="24" y1="50" x2="24" y2="62" stroke="#0bd25a" stroke-width="4" stroke-linecap="round"/>
            <line x1="18" y1="56" x2="30" y2="56" stroke="#0bd25a" stroke-width="4" stroke-linecap="round"/>
            <circle cx="70" cy="52" r="4" fill="#0bd25a"/>
            <circle cx="80" cy="60" r="4" fill="#0bd25a"/></g>

  <!-- category pill -->
  <g transform="translate(40,38)">
    <rect width="117" height="34" rx="17" fill="#0bd25a" opacity="0.16"/>
    <rect width="117" height="34" rx="17" fill="none" stroke="#0bd25a" stroke-width="1" opacity="0.5"/>
    <g transform="translate(13,7) scale(0.20)"><path d="M28 34 H72 C84 34 92 46 92 60 C92 72 86 78 79 78
              C73 78 70 72 66 68 H34 C30 72 27 78 21 78 C14 78 8 72 8 60
              C8 46 16 34 28 34 Z" fill="none" stroke="#2bef79" stroke-width="4"/>
            <line x1="24" y1="50" x2="24" y2="62" stroke="#2bef79" stroke-width="4" stroke-linecap="round"/>
            <line x1="18" y1="56" x2="30" y2="56" stroke="#2bef79" stroke-width="4" stroke-linecap="round"/>
            <circle cx="70" cy="52" r="4" fill="#2bef79"/>
            <circle cx="80" cy="60" r="4" fill="#2bef79"/></g>
    <text x="38" y="23" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="1.5" fill="#2bef79">CONSOLES</text>
  </g>

  <!-- icon badge -->
  <g transform="translate(40,120)">
    <rect width="64" height="64" rx="16" fill="#0bd25a" opacity="0.14"/>
    <rect width="64" height="64" rx="16" fill="none" stroke="#0bd25a" stroke-width="1.2" opacity="0.45"/>
    <g transform="translate(13,13) scale(0.38)"><path d="M28 34 H72 C84 34 92 46 92 60 C92 72 86 78 79 78
              C73 78 70 72 66 68 H34 C30 72 27 78 21 78 C14 78 8 72 8 60
              C8 46 16 34 28 34 Z" fill="none" stroke="#2bef79" stroke-width="4"/>
            <line x1="24" y1="50" x2="24" y2="62" stroke="#2bef79" stroke-width="4" stroke-linecap="round"/>
            <line x1="18" y1="56" x2="30" y2="56" stroke="#2bef79" stroke-width="4" stroke-linecap="round"/>
            <circle cx="70" cy="52" r="4" fill="#2bef79"/>
            <circle cx="80" cy="60" r="4" fill="#2bef79"/></g>
  </g>

  <!-- headline keyword -->
  <text x="42" y="232" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="56" font-weight="800" letter-spacing="-1" fill="url(#ink3)">STEAM DECK</text>
  <rect x="44" y="248" width="64" height="5" rx="2.5" fill="#0bd25a"/>
  <text x="42" y="284" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="17" font-weight="500" fill="#94a3b8">Gaming &amp; consoles</text>

  <!-- wordmark -->
  <text x="42" y="324" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#0bd25a" opacity="0.85">F.AI.Z<tspan fill="#64748b" letter-spacing="3"> · TECH</tspan></text>
</svg>