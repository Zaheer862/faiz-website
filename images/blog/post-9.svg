<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350" role="img" aria-label="Samsung Galaxy smartphone camera">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="58%" stop-color="#121b49"/>
      <stop offset="100%" stop-color="#0a218e"/>
    </linearGradient>
    <radialGradient id="glowA9" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4968fc" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4968fc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ink9" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="soft9" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
  </defs>

  <rect width="600" height="350" fill="url(#bg9)"/>

  <!-- soft accent glows -->
  <circle cx="529" cy="110" r="150" fill="url(#glowA9)" filter="url(#soft9)"/>
  <circle cx="162" cy="334" r="120" fill="url(#glowA9)" opacity="0.5" filter="url(#soft9)"/>

  <!-- decorative pattern -->
  <circle cx="565" cy="220" r="34" fill="none" stroke="#4968fc" stroke-width="2" opacity="0.18000000000000002"/>
  <circle cx="565" cy="220" r="68" fill="none" stroke="#4968fc" stroke-width="2" opacity="0.16"/>
  <circle cx="565" cy="220" r="102" fill="none" stroke="#4968fc" stroke-width="2" opacity="0.14"/>
  <circle cx="565" cy="220" r="136" fill="none" stroke="#4968fc" stroke-width="2" opacity="0.12000000000000001"/>
  <circle cx="565" cy="220" r="170" fill="none" stroke="#4968fc" stroke-width="2" opacity="0.1"/>
  <circle cx="565" cy="220" r="204" fill="none" stroke="#4968fc" stroke-width="2" opacity="0.08000000000000002"/>

  <!-- large watermark icon -->
  <g transform="translate(372,150) scale(2.1)" opacity="0.08"><rect x="34" y="8" width="32" height="84" rx="9" fill="none" stroke="#4968fc" stroke-width="4"/>
          <rect x="40" y="18" width="20" height="58" rx="2" fill="#4968fc" opacity="0.35"/>
          <rect x="44" y="11" width="12" height="3" rx="1.5" fill="#4968fc"/>
          <circle cx="50" cy="84" r="3" fill="#4968fc"/></g>

  <!-- category pill -->
  <g transform="translate(40,38)">
    <rect width="100" height="34" rx="17" fill="#4968fc" opacity="0.16"/>
    <rect width="100" height="34" rx="17" fill="none" stroke="#4968fc" stroke-width="1" opacity="0.5"/>
    <g transform="translate(13,7) scale(0.20)"><rect x="34" y="8" width="32" height="84" rx="9" fill="none" stroke="#889cfb" stroke-width="4"/>
          <rect x="40" y="18" width="20" height="58" rx="2" fill="#889cfb" opacity="0.35"/>
          <rect x="44" y="11" width="12" height="3" rx="1.5" fill="#889cfb"/>
          <circle cx="50" cy="84" r="3" fill="#889cfb"/></g>
    <text x="38" y="23" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="1.5" fill="#889cfb">PHONES</text>
  </g>

  <!-- icon badge -->
  <g transform="translate(40,120)">
    <rect width="64" height="64" rx="16" fill="#4968fc" opacity="0.14"/>
    <rect width="64" height="64" rx="16" fill="none" stroke="#4968fc" stroke-width="1.2" opacity="0.45"/>
    <g transform="translate(13,13) scale(0.38)"><rect x="34" y="8" width="32" height="84" rx="9" fill="none" stroke="#889cfb" stroke-width="4"/>
          <rect x="40" y="18" width="20" height="58" rx="2" fill="#889cfb" opacity="0.35"/>
          <rect x="44" y="11" width="12" height="3" rx="1.5" fill="#889cfb"/>
          <circle cx="50" cy="84" r="3" fill="#889cfb"/></g>
  </g>

  <!-- headline keyword -->
  <text x="42" y="232" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="64" font-weight="800" letter-spacing="-1" fill="url(#ink9)">SAMSUNG</text>
  <rect x="44" y="248" width="64" height="5" rx="2.5" fill="#4968fc"/>
  <text x="42" y="284" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="17" font-weight="500" fill="#94a3b8">New phone news &amp; leaks</text>

  <!-- wordmark -->
  <text x="42" y="324" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#4968fc" opacity="0.85">F.AI.Z<tspan fill="#64748b" letter-spacing="3"> · TECH</tspan></text>
</svg>