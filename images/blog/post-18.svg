<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350" role="img" aria-label="Cybersecurity conference and digital defence">
  <defs>
    <linearGradient id="bg18" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="58%" stop-color="#482315"/>
      <stop offset="100%" stop-color="#8a320f"/>
    </linearGradient>
    <radialGradient id="glowA18" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f67f51" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f67f51" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ink18" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="soft18" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
  </defs>

  <rect width="600" height="350" fill="url(#bg18)"/>

  <!-- soft accent glows -->
  <circle cx="540" cy="113" r="150" fill="url(#glowA18)" filter="url(#soft18)"/>
  <circle cx="187" cy="328" r="120" fill="url(#glowA18)" opacity="0.5" filter="url(#soft18)"/>

  <!-- decorative pattern -->
  <line x1="300" y1="-20" x2="440" y2="170" stroke="#f67f51" stroke-width="2" opacity="0.12"/>
  <line x1="340" y1="-20" x2="480" y2="170" stroke="#f67f51" stroke-width="2" opacity="0.12"/>
  <line x1="380" y1="-20" x2="520" y2="170" stroke="#f67f51" stroke-width="2" opacity="0.12"/>
  <line x1="420" y1="-20" x2="560" y2="170" stroke="#f67f51" stroke-width="2" opacity="0.12"/>
  <line x1="460" y1="-20" x2="600" y2="170" stroke="#f67f51" stroke-width="2" opacity="0.12"/>
  <line x1="500" y1="-20" x2="640" y2="170" stroke="#f67f51" stroke-width="2" opacity="0.12"/>
  <line x1="540" y1="-20" x2="680" y2="170" stroke="#f67f51" stroke-width="2" opacity="0.12"/>
  <line x1="580" y1="-20" x2="720" y2="170" stroke="#f67f51" stroke-width="2" opacity="0.12"/>
  <line x1="620" y1="-20" x2="760" y2="170" stroke="#f67f51" stroke-width="2" opacity="0.12"/>

  <!-- large watermark icon -->
  <g transform="translate(372,150) scale(2.1)" opacity="0.08"><path d="M50 6 L84 20 V48 C84 72 68 86 50 94 C32 86 16 72 16 48 V20 Z"
             fill="none" stroke="#f67f51" stroke-width="4"/>
           <path d="M37 49 L46 60 L65 36" fill="none" stroke="#f67f51" stroke-width="5"
             stroke-linecap="round" stroke-linejoin="round"/></g>

  <!-- category pill -->
  <g transform="translate(40,38)">
    <rect width="168" height="34" rx="17" fill="#f67f51" opacity="0.16"/>
    <rect width="168" height="34" rx="17" fill="none" stroke="#f67f51" stroke-width="1" opacity="0.5"/>
    <g transform="translate(13,7) scale(0.20)"><path d="M50 6 L84 20 V48 C84 72 68 86 50 94 C32 86 16 72 16 48 V20 Z"
             fill="none" stroke="#f7ab8e" stroke-width="4"/>
           <path d="M37 49 L46 60 L65 36" fill="none" stroke="#f7ab8e" stroke-width="5"
             stroke-linecap="round" stroke-linejoin="round"/></g>
    <text x="38" y="23" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="1.5" fill="#f7ab8e">CYBER SECURITY</text>
  </g>

  <!-- icon badge -->
  <g transform="translate(40,120)">
    <rect width="64" height="64" rx="16" fill="#f67f51" opacity="0.14"/>
    <rect width="64" height="64" rx="16" fill="none" stroke="#f67f51" stroke-width="1.2" opacity="0.45"/>
    <g transform="translate(13,13) scale(0.38)"><path d="M50 6 L84 20 V48 C84 72 68 86 50 94 C32 86 16 72 16 48 V20 Z"
             fill="none" stroke="#f7ab8e" stroke-width="4"/>
           <path d="M37 49 L46 60 L65 36" fill="none" stroke="#f7ab8e" stroke-width="5"
             stroke-linecap="round" stroke-linejoin="round"/></g>
  </g>

  <!-- headline keyword -->
  <text x="42" y="232" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="56" font-weight="800" letter-spacing="-1" fill="url(#ink18)">CYBER ALERT</text>
  <rect x="44" y="248" width="64" height="5" rx="2.5" fill="#f67f51"/>
  <text x="42" y="284" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="17" font-weight="500" fill="#94a3b8">Stay safe online</text>

  <!-- wordmark -->
  <text x="42" y="324" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#f67f51" opacity="0.85">F.AI.Z<tspan fill="#64748b" letter-spacing="3"> · TECH</tspan></text>
</svg>