<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350" role="img" aria-label="Google Pixel smartphone with AI features">
  <defs>
    <linearGradient id="bg15" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="58%" stop-color="#124549"/>
      <stop offset="100%" stop-color="#0a838e"/>
    </linearGradient>
    <radialGradient id="glowA15" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#49eefc" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#49eefc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ink15" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="soft15" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
  </defs>

  <rect width="600" height="350" fill="url(#bg15)"/>

  <!-- soft accent glows -->
  <circle cx="550" cy="110" r="150" fill="url(#glowA15)" filter="url(#soft15)"/>
  <circle cx="157" cy="325" r="120" fill="url(#glowA15)" opacity="0.5" filter="url(#soft15)"/>

  <!-- decorative pattern -->
  <circle cx="548" cy="290" r="16" fill="none" stroke="#49eefc" stroke-width="2" opacity="0.13"/>
  <circle cx="416" cy="40" r="8" fill="none" stroke="#49eefc" stroke-width="2" opacity="0.13"/>
  <circle cx="481" cy="38" r="11" fill="none" stroke="#49eefc" stroke-width="2" opacity="0.13"/>
  <circle cx="471" cy="69" r="24" fill="none" stroke="#49eefc" stroke-width="2" opacity="0.13"/>
  <circle cx="547" cy="76" r="7" fill="none" stroke="#49eefc" stroke-width="2" opacity="0.13"/>
  <circle cx="468" cy="138" r="24" fill="none" stroke="#49eefc" stroke-width="2" opacity="0.13"/>
  <circle cx="387" cy="99" r="9" fill="none" stroke="#49eefc" stroke-width="2" opacity="0.13"/>
  <circle cx="561" cy="248" r="20" fill="none" stroke="#49eefc" stroke-width="2" opacity="0.13"/>
  <circle cx="405" cy="89" r="12" fill="none" stroke="#49eefc" stroke-width="2" opacity="0.13"/>
  <circle cx="361" cy="263" r="27" fill="none" stroke="#49eefc" stroke-width="2" opacity="0.13"/>
  <circle cx="529" cy="94" r="22" fill="none" stroke="#49eefc" stroke-width="2" opacity="0.13"/>
  <circle cx="473" cy="299" r="7" fill="none" stroke="#49eefc" stroke-width="2" opacity="0.13"/>
  <circle cx="491" cy="88" r="12" fill="none" stroke="#49eefc" stroke-width="2" opacity="0.13"/>
  <circle cx="519" cy="160" r="31" fill="none" stroke="#49eefc" stroke-width="2" opacity="0.13"/>

  <!-- large watermark icon -->
  <g transform="translate(372,150) scale(2.1)" opacity="0.08"><rect x="34" y="8" width="32" height="84" rx="9" fill="none" stroke="#49eefc" stroke-width="4"/>
          <rect x="40" y="18" width="20" height="58" rx="2" fill="#49eefc" opacity="0.35"/>
          <rect x="44" y="11" width="12" height="3" rx="1.5" fill="#49eefc"/>
          <circle cx="50" cy="84" r="3" fill="#49eefc"/></g>

  <!-- category pill -->
  <g transform="translate(40,38)">
    <rect width="100" height="34" rx="17" fill="#49eefc" opacity="0.16"/>
    <rect width="100" height="34" rx="17" fill="none" stroke="#49eefc" stroke-width="1" opacity="0.5"/>
    <g transform="translate(13,7) scale(0.20)"><rect x="34" y="8" width="32" height="84" rx="9" fill="none" stroke="#88f2fb" stroke-width="4"/>
          <rect x="40" y="18" width="20" height="58" rx="2" fill="#88f2fb" opacity="0.35"/>
          <rect x="44" y="11" width="12" height="3" rx="1.5" fill="#88f2fb"/>
          <circle cx="50" cy="84" r="3" fill="#88f2fb"/></g>
    <text x="38" y="23" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="1.5" fill="#88f2fb">PHONES</text>
  </g>

  <!-- icon badge -->
  <g transform="translate(40,120)">
    <rect width="64" height="64" rx="16" fill="#49eefc" opacity="0.14"/>
    <rect width="64" height="64" rx="16" fill="none" stroke="#49eefc" stroke-width="1.2" opacity="0.45"/>
    <g transform="translate(13,13) scale(0.38)"><rect x="34" y="8" width="32" height="84" rx="9" fill="none" stroke="#88f2fb" stroke-width="4"/>
          <rect x="40" y="18" width="20" height="58" rx="2" fill="#88f2fb" opacity="0.35"/>
          <rect x="44" y="11" width="12" height="3" rx="1.5" fill="#88f2fb"/>
          <circle cx="50" cy="84" r="3" fill="#88f2fb"/></g>
  </g>

  <!-- headline keyword -->
  <text x="42" y="232" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="46" font-weight="800" letter-spacing="-1" fill="url(#ink15)">GOOGLE PIXEL</text>
  <rect x="44" y="248" width="64" height="5" rx="2.5" fill="#49eefc"/>
  <text x="42" y="284" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="17" font-weight="500" fill="#94a3b8">New phone news &amp; leaks</text>

  <!-- wordmark -->
  <text x="42" y="324" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#49eefc" opacity="0.85">F.AI.Z<tspan fill="#64748b" letter-spacing="3"> · TECH</tspan></text>
</svg>