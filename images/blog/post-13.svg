<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350" role="img" aria-label="Cybersecurity hacking threat on iPhone">
  <defs>
    <linearGradient id="bg13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="58%" stop-color="#481b15"/>
      <stop offset="100%" stop-color="#8a1d0f"/>
    </linearGradient>
    <radialGradient id="glowA13" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f66351" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f66351" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ink13" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="soft13" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
  </defs>

  <rect width="600" height="350" fill="url(#bg13)"/>

  <!-- soft accent glows -->
  <circle cx="528" cy="76" r="150" fill="url(#glowA13)" filter="url(#soft13)"/>
  <circle cx="166" cy="329" r="120" fill="url(#glowA13)" opacity="0.5" filter="url(#soft13)"/>

  <!-- decorative pattern -->
  <circle cx="570" cy="240" r="34" fill="none" stroke="#f66351" stroke-width="2" opacity="0.18000000000000002"/>
  <circle cx="570" cy="240" r="68" fill="none" stroke="#f66351" stroke-width="2" opacity="0.16"/>
  <circle cx="570" cy="240" r="102" fill="none" stroke="#f66351" stroke-width="2" opacity="0.14"/>
  <circle cx="570" cy="240" r="136" fill="none" stroke="#f66351" stroke-width="2" opacity="0.12000000000000001"/>
  <circle cx="570" cy="240" r="170" fill="none" stroke="#f66351" stroke-width="2" opacity="0.1"/>
  <circle cx="570" cy="240" r="204" fill="none" stroke="#f66351" stroke-width="2" opacity="0.08000000000000002"/>

  <!-- large watermark icon -->
  <g transform="translate(372,150) scale(2.1)" opacity="0.08"><path d="M50 6 L84 20 V48 C84 72 68 86 50 94 C32 86 16 72 16 48 V20 Z"
             fill="none" stroke="#f66351" stroke-width="4"/>
           <path d="M37 49 L46 60 L65 36" fill="none" stroke="#f66351" stroke-width="5"
             stroke-linecap="round" stroke-linejoin="round"/></g>

  <!-- category pill -->
  <g transform="translate(40,38)">
    <rect width="168" height="34" rx="17" fill="#f66351" opacity="0.16"/>
    <rect width="168" height="34" rx="17" fill="none" stroke="#f66351" stroke-width="1" opacity="0.5"/>
    <g transform="translate(13,7) scale(0.20)"><path d="M50 6 L84 20 V48 C84 72 68 86 50 94 C32 86 16 72 16 48 V20 Z"
             fill="none" stroke="#f7998e" stroke-width="4"/>
           <path d="M37 49 L46 60 L65 36" fill="none" stroke="#f7998e" stroke-width="5"
             stroke-linecap="round" stroke-linejoin="round"/></g>
    <text x="38" y="23" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="1.5" fill="#f7998e">CYBER SECURITY</text>
  </g>

  <!-- icon badge -->
  <g transform="translate(40,120)">
    <rect width="64" height="64" rx="16" fill="#f66351" opacity="0.14"/>
    <rect width="64" height="64" rx="16" fill="none" stroke="#f66351" stroke-width="1.2" opacity="0.45"/>
    <g transform="translate(13,13) scale(0.38)"><path d="M50 6 L84 20 V48 C84 72 68 86 50 94 C32 86 16 72 16 48 V20 Z"
             fill="none" stroke="#f7998e" stroke-width="4"/>
           <path d="M37 49 L46 60 L65 36" fill="none" stroke="#f7998e" stroke-width="5"
             stroke-linecap="round" stroke-linejoin="round"/></g>
  </g>

  <!-- headline keyword -->
  <text x="42" y="232" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="64" font-weight="800" letter-spacing="-1" fill="url(#ink13)">iPHONE</text>
  <rect x="44" y="248" width="64" height="5" rx="2.5" fill="#f66351"/>
  <text x="42" y="284" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="17" font-weight="500" fill="#94a3b8">Stay safe online</text>

  <!-- wordmark -->
  <text x="42" y="324" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#f66351" opacity="0.85">F.AI.Z<tspan fill="#64748b" letter-spacing="3"> · TECH</tspan></text>
</svg>