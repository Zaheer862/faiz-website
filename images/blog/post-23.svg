<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350" role="img" aria-label="Motorola Razr Fold foldable smartphone">
  <defs>
    <linearGradient id="bg23" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="58%" stop-color="#122349"/>
      <stop offset="100%" stop-color="#0a348e"/>
    </linearGradient>
    <radialGradient id="glowA23" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4982fc" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4982fc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ink23" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="soft23" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
  </defs>

  <rect width="600" height="350" fill="url(#bg23)"/>

  <!-- soft accent glows -->
  <circle cx="535" cy="123" r="150" fill="url(#glowA23)" filter="url(#soft23)"/>
  <circle cx="135" cy="308" r="120" fill="url(#glowA23)" opacity="0.5" filter="url(#soft23)"/>

  <!-- decorative pattern -->
  <circle cx="357" cy="300" r="23" fill="none" stroke="#4982fc" stroke-width="2" opacity="0.13"/>
  <circle cx="338" cy="177" r="34" fill="none" stroke="#4982fc" stroke-width="2" opacity="0.13"/>
  <circle cx="385" cy="227" r="25" fill="none" stroke="#4982fc" stroke-width="2" opacity="0.13"/>
  <circle cx="337" cy="230" r="33" fill="none" stroke="#4982fc" stroke-width="2" opacity="0.13"/>
  <circle cx="341" cy="257" r="14" fill="none" stroke="#4982fc" stroke-width="2" opacity="0.13"/>
  <circle cx="389" cy="156" r="36" fill="none" stroke="#4982fc" stroke-width="2" opacity="0.13"/>
  <circle cx="353" cy="300" r="26" fill="none" stroke="#4982fc" stroke-width="2" opacity="0.13"/>
  <circle cx="431" cy="216" r="27" fill="none" stroke="#4982fc" stroke-width="2" opacity="0.13"/>
  <circle cx="455" cy="125" r="24" fill="none" stroke="#4982fc" stroke-width="2" opacity="0.13"/>
  <circle cx="487" cy="133" r="17" fill="none" stroke="#4982fc" stroke-width="2" opacity="0.13"/>
  <circle cx="473" cy="252" r="13" fill="none" stroke="#4982fc" stroke-width="2" opacity="0.13"/>
  <circle cx="498" cy="84" r="24" fill="none" stroke="#4982fc" stroke-width="2" opacity="0.13"/>
  <circle cx="454" cy="117" r="8" fill="none" stroke="#4982fc" stroke-width="2" opacity="0.13"/>
  <circle cx="537" cy="300" r="21" fill="none" stroke="#4982fc" stroke-width="2" opacity="0.13"/>

  <!-- large watermark icon -->
  <g transform="translate(372,150) scale(2.1)" opacity="0.08"><rect x="34" y="8" width="32" height="84" rx="9" fill="none" stroke="#4982fc" stroke-width="4"/>
          <rect x="40" y="18" width="20" height="58" rx="2" fill="#4982fc" opacity="0.35"/>
          <rect x="44" y="11" width="12" height="3" rx="1.5" fill="#4982fc"/>
          <circle cx="50" cy="84" r="3" fill="#4982fc"/></g>

  <!-- category pill -->
  <g transform="translate(40,38)">
    <rect width="100" height="34" rx="17" fill="#4982fc" opacity="0.16"/>
    <rect width="100" height="34" rx="17" fill="none" stroke="#4982fc" stroke-width="1" opacity="0.5"/>
    <g transform="translate(13,7) scale(0.20)"><rect x="34" y="8" width="32" height="84" rx="9" fill="none" stroke="#88acfb" stroke-width="4"/>
          <rect x="40" y="18" width="20" height="58" rx="2" fill="#88acfb" opacity="0.35"/>
          <rect x="44" y="11" width="12" height="3" rx="1.5" fill="#88acfb"/>
          <circle cx="50" cy="84" r="3" fill="#88acfb"/></g>
    <text x="38" y="23" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="1.5" fill="#88acfb">PHONES</text>
  </g>

  <!-- icon badge -->
  <g transform="translate(40,120)">
    <rect width="64" height="64" rx="16" fill="#4982fc" opacity="0.14"/>
    <rect width="64" height="64" rx="16" fill="none" stroke="#4982fc" stroke-width="1.2" opacity="0.45"/>
    <g transform="translate(13,13) scale(0.38)"><rect x="34" y="8" width="32" height="84" rx="9" fill="none" stroke="#88acfb" stroke-width="4"/>
          <rect x="40" y="18" width="20" height="58" rx="2" fill="#88acfb" opacity="0.35"/>
          <rect x="44" y="11" width="12" height="3" rx="1.5" fill="#88acfb"/>
          <circle cx="50" cy="84" r="3" fill="#88acfb"/></g>
  </g>

  <!-- headline keyword -->
  <text x="42" y="232" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="64" font-weight="800" letter-spacing="-1" fill="url(#ink23)">MOTOROLA</text>
  <rect x="44" y="248" width="64" height="5" rx="2.5" fill="#4982fc"/>
  <text x="42" y="284" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="17" font-weight="500" fill="#94a3b8">New phone news &amp; leaks</text>

  <!-- wordmark -->
  <text x="42" y="324" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#4982fc" opacity="0.85">F.AI.Z<tspan fill="#64748b" letter-spacing="3"> · TECH</tspan></text>
</svg>