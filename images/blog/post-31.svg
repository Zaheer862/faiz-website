<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350" role="img" aria-label="Phishing scam text message warning on smartphone">
  <defs>
    <linearGradient id="bg31" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="58%" stop-color="#482015"/>
      <stop offset="100%" stop-color="#8a290f"/>
    </linearGradient>
    <radialGradient id="glowA31" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f67351" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f67351" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ink31" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="soft31" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
  </defs>

  <rect width="600" height="350" fill="url(#bg31)"/>

  <!-- soft accent glows -->
