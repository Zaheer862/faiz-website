  <circle cx="387" cy="66" r="30" fill="none" stroke="#f67351" stroke-width="2" opacity="0.13"/>
  <circle cx="558" cy="58" r="24" fill="none" stroke="#f67351" stroke-width="2" opacity="0.13"/>
  <circle cx="426" cy="191" r="7" fill="none" stroke="#f67351" stroke-width="2" opacity="0.13"/>
  <circle cx="470" cy="131" r="17" fill="none" stroke="#f67351" stroke-width="2" opacity="0.13"/>
  <circle cx="570" cy="211" r="31" fill="none" stroke="#f67351" stroke-width="2" opacity="0.13"/>
