  <circle cx="449" cy="117" r="16" fill="none" stroke="#f67351" stroke-width="2" opacity="0.13"/>
  <circle cx="487" cy="112" r="24" fill="none" stroke="#f67351" stroke-width="2" opacity="0.13"/>
  <circle cx="414" cy="49" r="11" fill="none" stroke="#f67351" stroke-width="2" opacity="0.13"/>
  <circle cx="490" cy="298" r="20" fill="none" stroke="#f67351" stroke-width="2" opacity="0.13"/>
  <circle cx="548" cy="228" r="16" fill="none" stroke="#f67351" stroke-width="2" opacity="0.13"/>
