             stroke-linecap="round" stroke-linejoin="round"/></g>
  </g>

  <!-- headline keyword -->
  <text x="42" y="232" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="64" font-weight="800" letter-spacing="-1" fill="url(#ink31)">PHISHING</text>
  <rect x="44" y="248" width="64" height="5" rx="2.5" fill="#f67351"/>
  <text x="42" y="284" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="17" font-weight="500" fill="#94a3b8">Stay safe online</text>

  <!-- wordmark -->
  <text x="42" y="324" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#f67351" opacity="0.85">F.AI.Z<tspan fill="#64748b" letter-spacing="3"> · TECH</tspan></text>
</svg>