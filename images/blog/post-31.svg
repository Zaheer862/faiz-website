    <rect width="168" height="34" rx="17" fill="none" stroke="#f67351" stroke-width="1" opacity="0.5"/>
    <g transform="translate(13,7) scale(0.20)"><path d="M50 6 L84 20 V48 C84 72 68 86 50 94 C32 86 16 72 16 48 V20 Z"
