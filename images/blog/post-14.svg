<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350" role="img" aria-label="Samsung Galaxy S25 smartphone">
  <defs>
    <linearGradient id="bg14" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="58%" stop-color="#121849"/>
      <stop offset="100%" stop-color="#0a198e"/>
    </linearGradient>
    <radialGradient id="glowA14" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#495dfc" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#495dfc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ink14" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="soft14" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
  </defs>

  <rect width="600" height="350" fill="url(#bg14)"/>

  <!-- soft accent glows -->
  <circle cx="479" cy="119" r="150" fill="url(#glowA14)" filter="url(#soft14)"/>
  <circle cx="187" cy="331" r="120" fill="url(#glowA14)" opacity="0.5" filter="url(#soft14)"/>

  <!-- decorative pattern -->
  <line x1="300" y1="-20" x2="440" y2="170" stroke="#495dfc" stroke-width="2" opacity="0.12"/>
  <line x1="340" y1="-20" x2="480" y2="170" stroke="#495dfc" stroke-width="2" opacity="0.12"/>
  <line x1="380" y1="-20" x2="520" y2="170" stroke="#495dfc" stroke-width="2" opacity="0.12"/>
  <line x1="420" y1="-20" x2="560" y2="170" stroke="#495dfc" stroke-width="2" opacity="0.12"/>
  <line x1="460" y1="-20" x2="600" y2="170" stroke="#495dfc" stroke-width="2" opacity="0.12"/>
  <line x1="500" y1="-20" x2="640" y2="170" stroke="#495dfc" stroke-width="2" opacity="0.12"/>
  <line x1="540" y1="-20" x2="680" y2="170" stroke="#495dfc" stroke-width="2" opacity="0.12"/>
  <line x1="580" y1="-20" x2="720" y2="170" stroke="#495dfc" stroke-width="2" opacity="0.12"/>
  <line x1="620" y1="-20" x2="760" y2="170" stroke="#495dfc" stroke-width="2" opacity="0.12"/>

  <!-- large watermark icon -->
  <g transform="translate(372,150) scale(2.1)" opacity="0.08"><rect x="34" y="8" width="32" height="84" rx="9" fill="none" stroke="#495dfc" stroke-width="4"/>
          <rect x="40" y="18" width="20" height="58" rx="2" fill="#495dfc" opacity="0.35"/>
          <rect x="44" y="11" width="12" height="3" rx="1.5" fill="#495dfc"/>
          <circle cx="50" cy="84" r="3" fill="#495dfc"/></g>

  <!-- category pill -->
  <g transform="translate(40,38)">
    <rect width="100" height="34" rx="17" fill="#495dfc" opacity="0.16"/>
    <rect width="100" height="34" rx="17" fill="none" stroke="#495dfc" stroke-width="1" opacity="0.5"/>
    <g transform="translate(13,7) scale(0.20)"><rect x="34" y="8" width="32" height="84" rx="9" fill="none" stroke="#8895fb" stroke-width="4"/>
          <rect x="40" y="18" width="20" height="58" rx="2" fill="#8895fb" opacity="0.35"/>
          <rect x="44" y="11" width="12" height="3" rx="1.5" fill="#8895fb"/>
          <circle cx="50" cy="84" r="3" fill="#8895fb"/></g>
    <text x="38" y="23" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="14" font-weight="700" letter-spacing="1.5" fill="#8895fb">PHONES</text>
  </g>

  <!-- icon badge -->
  <g transform="translate(40,120)">
    <rect width="64" height="64" rx="16" fill="#495dfc" opacity="0.14"/>
    <rect width="64" height="64" rx="16" fill="none" stroke="#495dfc" stroke-width="1.2" opacity="0.45"/>
    <g transform="translate(13,13) scale(0.38)"><rect x="34" y="8" width="32" height="84" rx="9" fill="none" stroke="#8895fb" stroke-width="4"/>
          <rect x="40" y="18" width="20" height="58" rx="2" fill="#8895fb" opacity="0.35"/>
          <rect x="44" y="11" width="12" height="3" rx="1.5" fill="#8895fb"/>
          <circle cx="50" cy="84" r="3" fill="#8895fb"/></g>
  </g>

  <!-- headline keyword -->
  <text x="42" y="232" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="64" font-weight="800" letter-spacing="-1" fill="url(#ink14)">SAMSUNG</text>
  <rect x="44" y="248" width="64" height="5" rx="2.5" fill="#495dfc"/>
  <text x="42" y="284" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="17" font-weight="500" fill="#94a3b8">New phone news &amp; leaks</text>

  <!-- wordmark -->
  <text x="42" y="324" font-family="'Segoe UI',Roboto,Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#495dfc" opacity="0.85">F.AI.Z<tspan fill="#64748b" letter-spacing="3"> · TECH</tspan></text>
</svg>