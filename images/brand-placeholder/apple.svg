<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2a2a2a;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="600" height="450" fill="url(#bg)"/>
  <!-- Phone outline - Dynamic Island style -->
  <rect x="215" y="45" width="170" height="300" rx="40" ry="40" fill="none" stroke="#555" stroke-width="3"/>
  <rect x="225" y="80" width="150" height="225" rx="4" fill="#333" opacity="0.4"/>
  <!-- Dynamic Island -->
  <rect x="265" y="58" width="70" height="18" rx="9" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <!-- Side button -->
  <rect x="385" y="115" width="4" height="40" rx="2" fill="#555"/>
  <!-- Volume buttons -->
  <rect x="211" y="110" width="4" height="30" rx="2" fill="#555"/>
  <rect x="211" y="150" width="4" height="30" rx="2" fill="#555"/>
  <!-- Apple logo -->
  <text x="300" y="195" font-family="Arial, sans-serif" font-size="48" fill="#888" text-anchor="middle"></text>
  <text x="300" y="395" font-family="Arial, sans-serif" font-size="22" font-weight="300" fill="#888" text-anchor="middle" letter-spacing="8">iPhone</text>
  <text x="300" y="420" font-family="Arial, sans-serif" font-size="11" fill="#555" text-anchor="middle" letter-spacing="2">IMAGE COMING SOON</text>
</svg>
