# Cloudflare Pages configuration
#
# This is a plain static site (HTML/CSS/JS + images) with no build step.
# Cloudflare Pages was failing to deploy because, unlike Netlify, it did not
# know which directory to publish. `pages_build_output_dir` tells Pages to
# upload the repository root as-is (no build command required).
#
# This file is Cloudflare-specific and is ignored by Netlify.

name = "faiz-website"
pages_build_output_dir = "."
compatibility_date = "2026-06-12"
